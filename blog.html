<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Writing — Your Name</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="shared.css"/>
<style>
.blog-list { display: flex; flex-direction: column; }
.blog-item {
  display: grid; grid-template-columns: 80px 1fr;
  gap: 1.2rem; align-items: baseline;
  padding: 1.1rem 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: opacity 0.2s;
  text-decoration: none; color: inherit;
}
.blog-item:first-child { border-top: 1px solid var(--border); }
.blog-item:hover { opacity: 0.65; }
.blog-date { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--muted); padding-top: 2px; }
.blog-title { font-size: 0.88rem; line-height: 1.5; margin-bottom: 0.2rem; }
.blog-cat { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); }

@media (max-width: 580px) {
  .blog-item { grid-template-columns: 1fr; gap: 0.15rem; }
}
</style>
<script src="shared.js" defer></script>
</head>
<body>

<nav>
  <a class="nav-name" href="index.html">Your Name</a>
  <div class="nav-right">
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="blog.html">Writing</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="theme-btn" onclick="toggleTheme()"></button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <h2>Writing</h2>
    <p>Technical notes, opinions, and lessons from shipping software.</p>
  </div>

  <div class="blog-list" id="blogList">
    <p style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--muted);padding:1rem 0;">Loading posts…</p>
  </div>
</div>

<footer>
  <span>© 2025 Your Name</span>
  <span>Web &amp; App Developer</span>
</footer>

<script>
async function loadBlogPosts() {
  const el = document.getElementById('blogList');
  try {
    const res  = await fetch('/api/posts');
    const data = await res.json();
    const posts = data.posts || [];
    if (!posts.length) {
      el.innerHTML = '<p style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--muted);padding:1rem 0;">No posts yet.</p>';
      return;
    }
    el.innerHTML = posts.map(p => {
      const date = new Date(p.date).toLocaleDateString('en-IN', { month:'short', year:'numeric' });
      return `<a class="blog-item" href="/api/post-page?slug=${p.slug}">
        <span class="blog-date">${date}</span>
        <div>
          <p class="blog-title">${p.title}</p>
          <p class="blog-cat">${p.category}</p>
        </div>
      </a>`;
    }).join('');
  } catch {
    el.innerHTML = '<p style="font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--muted);padding:1rem 0;">Failed to load posts.</p>';
  }
}
loadBlogPosts();
</script>
</body>
</html>
