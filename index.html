<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xenon — Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">

<style>
.hero-inner{display:flex;align-items:center;justify-content:space-between;gap:3rem}
.hero-text{flex:1}
.hero-avatar{width:200px;height:200px;border-radius:50%;overflow:hidden;border:1px solid var(--border);flex-shrink:0}
.hero-avatar img{width:100%;height:100%;object-fit:cover;object-position:center top}

.hero-status{display:inline-flex;align-items:center;gap:.5rem;font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--muted)}
.status-dot{width:7px;height:7px;border-radius:50%}
.status-dot.online{background:#4caf7d}
.status-dot.idle{background:#f0a732}
.status-dot.dnd{background:#e05252}
.status-dot.offline{background:#555350}

.presence-stack{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1.6rem}

.spotify-widget{display:flex;align-items:center;gap:.8rem;min-height:50px}
.spotify-cover{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--border)}
.spotify-meta{display:flex;flex-direction:column}
.spotify-label,.spotify-artist,.spotify-offline{font-family:'IBM Plex Mono',monospace;color:var(--muted)}
.spotify-label{font-size:.65rem}
.spotify-artist,.spotify-offline{font-size:.72rem}
.spotify-title{font-size:.82rem;color:var(--text)}

.hero-desc{font-size:.9rem;color:var(--muted);line-height:1.85;max-width:440px;margin-bottom:2rem}

#trail-canvas{position:fixed;inset:0;pointer-events:none;z-index:9999}
#site-wrapper{will-change:transform}

@media(max-width:600px){
.hero-inner{flex-direction:column-reverse;align-items:flex-start}
.hero-avatar{width:110px;height:110px}
}
</style>
<script src="shared.js" defer></script>
</head>
<body>

<canvas id="trail-canvas"></canvas>

<div id="site-wrapper">

<nav>
<a class="nav-name" href="index.html">Xenon</a>
<div class="nav-right">
<ul class="nav-links">
<li><a href="work.html">Work</a></li>
<li><a href="blog.html">Writing</a></li>
<li><a href="contact.html">Contact</a></li>
</ul>
<button class="theme-btn" onclick="toggleTheme()"></button>
</div>
</nav>

<div class="page">
<div class="hero-inner">

<div class="hero-text">

<div class="presence-stack">
<div class="hero-status">
<span class="status-dot" id="statusDot"></span>
<span id="statusText">Connecting...</span>
</div>

<div id="spotifyWidget" class="spotify-widget">
<span class="spotify-offline">Loading Spotify...</span>
</div>
</div>

<h1>Xenon.</h1>

<p class="hero-desc">
Full-stack developer focused on web and mobile applications.
Clean code, honest interfaces, and software that holds up over time.
</p>

</div>

<div class="hero-avatar">
<img src="images/avatar.jpg" alt="Avatar">
</div>

</div>
</div>

<footer>
<span>© 2026 Xenon</span>
<span>Human Being</span>
</footer>

</div>

<script>
const DISCORD_ID="471288359269171201";

async function updatePresence(){
try{
const response=await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
const result=await response.json();
if(!result.success)return;

const data=result.data;

document.getElementById("statusDot").className="status-dot "+(data.discord_status||"offline");

const labels={online:"Online",idle:"Idle",dnd:"Do Not Disturb",offline:"Offline"};
document.getElementById("statusText").textContent=labels[data.discord_status]||"Offline";

const spotify=document.getElementById("spotifyWidget");

if(!data.listening_to_spotify||!data.spotify){
spotify.innerHTML='<div class="spotify-meta"><span class="spotify-label">Spotify</span><span class="spotify-offline">Currently not listening</span></div>';
return;
}

spotify.innerHTML=`
<img src="${data.spotify.album_art_url}" class="spotify-cover">
<div class="spotify-meta">
<span class="spotify-label">Listening to Spotify</span>
<span class="spotify-title">${data.spotify.song}</span>
<span class="spotify-artist">${data.spotify.artist}</span>
</div>`;
}catch(e){console.error(e);}
}
updatePresence();
setInterval(updatePresence,10000);

const canvas=document.getElementById("trail-canvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const points=[];
const maxPoints=40;

addEventListener("mousemove",e=>{
points.push({x:e.clientX,y:e.clientY});
if(points.length>maxPoints)points.shift();
});

function trail(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(points.length>2){
ctx.beginPath();
ctx.moveTo(points[0].x,points[0].y);

for(let i=1;i<points.length-2;i++){
const xc=(points[i].x+points[i+1].x)/2;
const yc=(points[i].y+points[i+1].y)/2;
ctx.quadraticCurveTo(points[i].x,points[i].y,xc,yc);
}

ctx.strokeStyle="rgba(0,220,255,.22)";
ctx.lineWidth=2;
ctx.shadowBlur=12;
ctx.shadowColor="#00dcff";
ctx.lineCap="round";
ctx.stroke();
}
requestAnimationFrame(trail);
}
trail();

const wrapper=document.getElementById("site-wrapper");
let tx=0,ty=0,cx=0,cy=0;

addEventListener("mousemove",e=>{
tx=((e.clientX/innerWidth)-0.5)*6;
ty=((e.clientY/innerHeight)-0.5)*6;
});

function floatPage(){
cx+=(tx-cx)*0.05;
cy+=(ty-cy)*0.05;
wrapper.style.transform=`translate(${cx}px,${cy}px)`;
requestAnimationFrame(floatPage);
}
floatPage();
</script>

</body>
</html>
