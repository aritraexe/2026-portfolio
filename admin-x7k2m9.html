<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Xenon</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0b0b0b;--bg2:#0f0f0f;--text:#ffffff;--muted:#bfbfbf;--border:#222222;--accent:#4caf7d}
[data-theme="light"]{--bg:#fafaf8;--bg2:#f3f2ef;--text:#1a1917;--muted:#888580;--border:#e0deda}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}

#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.login-box{width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:2.2rem 2rem}
.login-logo{font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1.5rem}
.login-title{font-size:1.2rem;font-weight:600;margin-bottom:1.8rem}
.f-field{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem}
.f-field label{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
.f-field input{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:0.7rem 0.9rem;font-family:'Inter',sans-serif;font-size:0.88rem;border-radius:4px;outline:none;width:100%;transition:border-color 0.2s}
.f-field input:focus{border-color:var(--accent)}
.login-err{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:#e05252;margin-top:0.3rem;display:none}
.btn-primary{width:100%;background:var(--accent);color:#000;border:none;padding:0.75rem;font-family:'Inter',sans-serif;font-size:0.88rem;font-weight:600;border-radius:4px;cursor:pointer;margin-top:0.5rem;transition:opacity 0.2s}
.btn-primary:hover{opacity:0.85}

#adminPanel{display:none;max-width:780px;margin:0 auto;padding:3rem 2rem 5rem}
.admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2.5rem;padding-bottom:1.2rem;border-bottom:1px solid var(--border)}
.admin-title{font-size:1.1rem;font-weight:600}
.admin-meta{font-family:'IBM Plex Mono',monospace;font-size:0.7rem;color:var(--muted)}
.hdr-btns{display:flex;gap:0.6rem;align-items:center}

.btn-sm{background:none;border:1px solid var(--border);color:var(--muted);padding:0.38rem 0.85rem;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;border-radius:4px;cursor:pointer;transition:all 0.2s;white-space:nowrap}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm.red:hover{border-color:#e05252;color:#e05252}

.form-section{margin-bottom:3rem}
.sec-title{font-family:'IBM Plex Mono',monospace;font-size:0.68rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:1.4rem;display:flex;align-items:center;gap:0.5rem}
.sec-title::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent);flex-shrink:0}

.edit-bar{display:none;background:var(--bg2);border:1px solid var(--accent);border-radius:5px;padding:0.75rem 1rem;margin-bottom:1.2rem;font-family:'IBM Plex Mono',monospace;font-size:0.72rem;color:var(--muted);align-items:center;justify-content:space-between;gap:1rem}
.edit-bar.on{display:flex}
.edit-bar strong{color:var(--text);font-weight:500}

.field{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem}
.field label{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase}
.field input,.field select,.field textarea{background:var(--bg2);border:1px solid var(--border);color:var(--text);padding:0.72rem 0.9rem;font-family:'Inter',sans-serif;font-size:0.88rem;border-radius:4px;outline:none;width:100%;resize:vertical;transition:border-color 0.2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:var(--bg2)}
.field textarea{min-height:280px;font-size:0.87rem;line-height:1.7}
.field-hint{font-family:'IBM Plex Mono',monospace;font-size:0.62rem;color:var(--muted);margin-top:0.3rem}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

.toolbar{display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.5rem}
.tb{background:var(--bg2);border:1px solid var(--border);color:var(--muted);padding:0.3rem 0.65rem;font-family:'IBM Plex Mono',monospace;font-size:0.68rem;border-radius:3px;cursor:pointer;transition:all 0.2s}
.tb:hover{border-color:var(--accent);color:var(--text)}
.tb:disabled{opacity:0.4;pointer-events:none}

.pub-row{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-top:0.5rem}
.btn-pub{background:var(--accent);color:#000;border:none;padding:0.75rem 2rem;font-family:'Inter',sans-serif;font-size:0.88rem;font-weight:600;border-radius:4px;cursor:pointer;transition:opacity 0.2s}
.btn-pub:hover{opacity:0.85}
.pub-status{font-family:'IBM Plex Mono',monospace;font-size:0.75rem;color:var(--muted)}

.posts-list{display:flex;flex-direction:column}
.post-row{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;border-bottom:1px solid var(--border);gap:1rem}
.post-row:first-child{border-top:1px solid var(--border)}
.pri{flex:1;min-width:0}
.pri-title{font-size:0.88rem;font-weight:500;margin-bottom:0.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pri-meta{font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted)}
.pra{display:flex;gap:0.5rem;flex-shrink:0}
.btn-act{background:none;border:1px solid var(--border);color:var(--muted);padding:0.28rem 0.65rem;font-family:'IBM Plex Mono',monospace;font-size:0.65rem;border-radius:3px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;transition:all 0.2s}
.btn-act:hover{border-color:var(--muted);color:var(--text)}
.btn-act.edit:hover{border-color:var(--accent);color:var(--accent)}
.btn-act.del:hover{border-color:#e05252;color:#e05252}
.no-posts{font-family:'IBM Plex Mono',monospace;font-size:0.78rem;color:var(--muted);padding:1.5rem 0}

@media(max-width:580px){
  #adminPanel{padding:2rem 1.2rem 4rem}
  .row2{grid-template-columns:1fr}
  .post-row{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <p class="login-logo">Xenon · Admin</p>
    <h1 class="login-title">Sign in</h1>
    <div class="f-field">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="Enter admin password"
             onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <p class="login-err" id="loginErr">Incorrect password.</p>
    <button class="btn-primary" onclick="doLogin()">Continue</button>
  </div>
</div>

<div id="adminPanel">
  <div class="admin-header">
    <div>
      <p class="admin-meta">Xenon · Admin Panel</p>
      <h1 class="admin-title">Blog Manager</h1>
    </div>
    <div class="hdr-btns">
      <button class="btn-sm" onclick="doExport()">⬇ Export</button>
      <label class="btn-sm" style="cursor:pointer">
        ⬆ Import
        <input type="file" accept=".json" style="display:none" onchange="doImport(this)"/>
      </label>
      <button class="btn-sm red" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="form-section">
    <p class="sec-title" id="formTitle">New Post</p>

    <div class="edit-bar" id="editBar">
      <span>✏️ Editing: <strong id="editBarTitle"></strong></span>
      <button class="btn-sm" onclick="resetForm()">✕ Cancel</button>
    </div>

    <div class="row2">
      <div class="field">
        <label>Title *</label>
        <input type="text" id="fTitle" placeholder="Post title"/>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="fCategory">
          <option>Project Write-up</option>
          <option>Architecture</option>
          <option>Mobile</option>
          <option>Performance</option>
          <option>Opinion</option>
          <option>Tutorial</option>
          <option>General</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Subtitle</label>
      <input type="text" id="fSubtitle" placeholder="Short description shown in listing"/>
    </div>

    <div class="field">
      <label>Tags <span style="font-weight:300">(comma separated)</span></label>
      <input type="text" id="fTags" placeholder="e.g. Discord.js, Node.js, MongoDB"/>
    </div>

    <div class="row2">
      <div class="field">
        <label>Banner Type <span style="font-weight:300">(optional)</span></label>
        <select id="fBannerType" onchange="onBannerChange()">
          <option value="">None</option>
          <option value="wip">🚧 Work in Progress</option>
          <option value="info">ℹ️ Info</option>
          <option value="warning">⚠️ Warning</option>
          <option value="tip">💡 Tip</option>
          <option value="update">🔄 Update</option>
          <option value="deprecated">❌ Deprecated</option>
        </select>
      </div>
      <div class="field">
        <label>Banner Message</label>
        <input type="text" id="fBannerMsg" placeholder="Leave blank to use default"/>
      </div>
    </div>

    <div class="field">
      <label>Body *</label>
      <div class="toolbar">
        <button class="tb" onclick="tbWrap('## ','')">H2</button>
        <button class="tb" onclick="tbWrap('### ','')">H3</button>
        <button class="tb" onclick="tbWrap('**','**')">Bold</button>
        <button class="tb" onclick="tbWrap('*','*')">Italic</button>
        <button class="tb" onclick="tbWrap('`','`')">Code</button>
        <button class="tb" onclick="tbList()">List</button>
        <button class="tb" onclick="tbDivider()">Divider</button>
        <button class="tb" id="imgBtn" onclick="document.getElementById('imgInput').click()">📷 Image</button>
        <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="doUpload(this)"/>
        <span id="imgStatus" style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);align-self:center"></span>
      </div>
      <textarea id="fBody" placeholder="Write your post here..."></textarea>
      <p class="field-hint">## H2 · ### H3 · **bold** · *italic* · `code` · - list · ![alt](url)</p>
    </div>

    <div class="pub-row">
      <button class="btn-pub" id="pubBtn" onclick="doPublish()">Publish Post →</button>
      <span class="pub-status" id="pubStatus"></span>
    </div>
  </div>

  <div class="form-section">
    <p class="sec-title">Published Posts</p>
    <div class="posts-list" id="postsList">
      <p class="no-posts">Loading…</p>
    </div>
  </div>
</div>

<script>
'use strict';

// ── globals ──────────────────────────────────────────────────────
let TOKEN      = null;
let EDITING_ID = null;
const POST_MAP = {};   // id -> post object, populated by loadPosts

const BANNER_DEFAULTS = {
  wip:        'This post is a work in progress. Content and details will be updated soon.',
  info:       'Just a heads up — some context worth knowing before reading.',
  warning:    'Caution: proceed carefully. Some parts of this may not work as expected.',
  tip:        'Pro tip — this little detail can save you a lot of time.',
  update:     'This post has been updated. Some information may differ from the original.',
  deprecated: 'Heads up — this content is outdated and may no longer be accurate.',
};

const CLD_CLOUD  = 'dw38typxl';
const CLD_PRESET = 'nx7evrcy';

// ── init ─────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('xenon_admin');
  if (saved) { TOKEN = saved; showPanel(); }
});

// ── login ─────────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if (!pw) return;
  fetch('/api/posts', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + pw },
    body:    JSON.stringify({ __ping: true }),
  })
  .then(r => {
    if (r.status === 401) {
      document.getElementById('loginErr').style.display = 'block';
    } else {
      document.getElementById('loginErr').style.display = 'none';
      TOKEN = pw;
      sessionStorage.setItem('xenon_admin', pw);
      showPanel();
    }
  })
  .catch(() => {
    document.getElementById('loginErr').style.display = 'block';
  });
}

function showPanel() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display  = 'block';
  loadPosts();
}

function doLogout() {
  TOKEN = null;
  sessionStorage.removeItem('xenon_admin');
  document.getElementById('adminPanel').style.display  = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
  resetForm();
}

// ── form ──────────────────────────────────────────────────────────
function resetForm() {
  EDITING_ID = null;
  document.getElementById('fTitle').value      = '';
  document.getElementById('fSubtitle').value   = '';
  document.getElementById('fTags').value        = '';
  document.getElementById('fBannerMsg').value  = '';
  document.getElementById('fBody').value        = '';
  document.getElementById('fCategory').selectedIndex  = 0;
  document.getElementById('fBannerType').selectedIndex = 0;
  document.getElementById('formTitle').textContent    = 'New Post';
  document.getElementById('pubBtn').textContent       = 'Publish Post →';
  document.getElementById('pubStatus').textContent    = '';
  document.getElementById('editBar').classList.remove('on');
}

function onBannerChange() {
  const t = document.getElementById('fBannerType').value;
  document.getElementById('fBannerMsg').value = t ? (BANNER_DEFAULTS[t] || '') : '';
}

// ── toolbar ───────────────────────────────────────────────────────
function tbWrap(b, a) {
  const ta = document.getElementById('fBody');
  const s  = ta.selectionStart, e = ta.selectionEnd;
  const sel = ta.value.substring(s, e) || 'text';
  ta.value = ta.value.substring(0, s) + b + sel + a + ta.value.substring(e);
  ta.focus();
}
function tbList() {
  const ta = document.getElementById('fBody');
  const p  = ta.selectionStart;
  ta.value = ta.value.substring(0, p) + '\n- Item 1\n- Item 2\n- Item 3\n' + ta.value.substring(p);
  ta.focus();
}
function tbDivider() {
  const ta = document.getElementById('fBody');
  const p  = ta.selectionStart;
  ta.value = ta.value.substring(0, p) + '\n\n---\n\n' + ta.value.substring(p);
  ta.focus();
}

// ── image upload ──────────────────────────────────────────────────
async function doUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const btn = document.getElementById('imgBtn');
  const st  = document.getElementById('imgStatus');
  const ta  = document.getElementById('fBody');
  btn.disabled = true; btn.textContent = '⏳ Uploading…'; st.textContent = '';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLD_PRESET);
  try {
    const r    = await fetch('https://api.cloudinary.com/v1_1/' + CLD_CLOUD + '/image/upload', { method: 'POST', body: fd });
    const data = await r.json();
    if (!data.secure_url) throw new Error('no url');
    const alt = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
    const md  = '\n\n![' + alt + '](' + data.secure_url + ')\n\n';
    const pos = ta.selectionStart;
    ta.value  = ta.value.substring(0, pos) + md + ta.value.substring(pos);
    ta.focus();
    st.style.color = '#4caf7d'; st.textContent = '✓ Uploaded';
    setTimeout(() => { st.textContent = ''; }, 3000);
  } catch {
    st.style.color = '#e05252'; st.textContent = '✗ Failed';
  } finally {
    btn.disabled = false; btn.textContent = '📷 Image'; input.value = '';
  }
}

// ── publish / save ────────────────────────────────────────────────
async function doPublish() {
  const title      = document.getElementById('fTitle').value.trim();
  const subtitle   = document.getElementById('fSubtitle').value.trim();
  const category   = document.getElementById('fCategory').value;
  const tagsRaw    = document.getElementById('fTags').value;
  const bannerType = document.getElementById('fBannerType').value;
  const bannerMsg  = document.getElementById('fBannerMsg').value.trim();
  const body       = document.getElementById('fBody').value.trim();

  if (!title) { setStatus('⚠ Title is required.', '#e05252'); return; }
  if (!body)  { setStatus('⚠ Body is required.',  '#e05252'); return; }

  const tags    = tagsRaw.split(',').map(t => t.trim()).filter(Boolean);
  const isEdit  = EDITING_ID !== null;
  const payload = { title, subtitle, category, tags, bannerType, bannerMsg, body };
  if (isEdit) payload.id = EDITING_ID;

  setStatus(isEdit ? 'Saving…' : 'Publishing…', 'var(--muted)');

  try {
    const r = await fetch('/api/posts', {
      method:  isEdit ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
      body:    JSON.stringify(payload),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed');
    setStatus((isEdit ? '✓ Saved — ' : '✓ Published — ') + data.slug, '#4caf7d');
    resetForm();
    loadPosts();
  } catch (err) {
    setStatus('✗ ' + err.message, '#e05252');
  }
}

function setStatus(msg, color) {
  const el = document.getElementById('pubStatus');
  el.textContent = msg;
  el.style.color = color;
}

// ── load posts ────────────────────────────────────────────────────
async function loadPosts() {
  const el = document.getElementById('postsList');
  el.innerHTML = '<p class="no-posts">Loading…</p>';
  try {
    const r    = await fetch('/api/posts');
    const data = await r.json();
    const list = data.posts || [];

    // populate POST_MAP so edit can look up by id safely
    Object.keys(POST_MAP).forEach(k => delete POST_MAP[k]);
    list.forEach(p => { POST_MAP[p.id] = p; });

    if (!list.length) { el.innerHTML = '<p class="no-posts">No posts yet.</p>'; return; }

    el.innerHTML = list.map(p => {
      const date = new Date(p.date).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      const upd  = p.updatedAt ? ' · edited ' + new Date(p.updatedAt).toLocaleDateString('en-IN', { day:'numeric', month:'short' }) : '';
      return [
        '<div class="post-row">',
          '<div class="pri">',
            '<p class="pri-title">' + esc(p.title) + '</p>',
            '<p class="pri-meta">' + date + upd + ' · ' + esc(p.category) + '</p>',
          '</div>',
          '<div class="pra">',
            '<a class="btn-act" href="/api/post-page?slug=' + p.slug + '" target="_blank">View ↗</a>',
            '<button class="btn-act edit" data-id="' + p.id + '" onclick="startEdit(this.dataset.id)">Edit</button>',
            '<button class="btn-act del"  data-id="' + p.id + '" data-title="' + esc(p.title) + '" onclick="doDelete(this.dataset.id, this.dataset.title)">Delete</button>',
          '</div>',
        '</div>',
      ].join('');
    }).join('');

  } catch {
    el.innerHTML = '<p class="no-posts">Failed to load posts.</p>';
  }
}

// ── edit ──────────────────────────────────────────────────────────
function startEdit(id) {
  const post = POST_MAP[id];
  if (!post) { alert('Post data not found. Try refreshing.'); return; }

  EDITING_ID = post.id;

  document.getElementById('fTitle').value    = post.title      || '';
  document.getElementById('fSubtitle').value = post.subtitle   || '';
  document.getElementById('fTags').value      = (post.tags || []).join(', ');
  document.getElementById('fBannerMsg').value = post.bannerMsg || '';
  document.getElementById('fBody').value      = post.body      || '';

  // category
  const cat = document.getElementById('fCategory');
  for (let i = 0; i < cat.options.length; i++) {
    if (cat.options[i].value === post.category) { cat.selectedIndex = i; break; }
  }

  // banner type
  const bt = document.getElementById('fBannerType');
  for (let i = 0; i < bt.options.length; i++) {
    if (bt.options[i].value === (post.bannerType || '')) { bt.selectedIndex = i; break; }
  }

  document.getElementById('formTitle').textContent    = 'Edit Post';
  document.getElementById('pubBtn').textContent       = 'Save Changes →';
  document.getElementById('editBarTitle').textContent = post.title;
  document.getElementById('editBar').classList.add('on');
  document.getElementById('pubStatus').textContent    = '';

  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => document.getElementById('fTitle').focus(), 500);
}

// ── delete ────────────────────────────────────────────────────────
async function doDelete(id, title) {
  if (!confirm('Delete "' + title + '"?\nThis cannot be undone.')) return;
  try {
    const r    = await fetch('/api/posts', {
      method:  'DELETE',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
      body:    JSON.stringify({ id }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Failed');
    if (EDITING_ID === id) resetForm();
    loadPosts();
  } catch (err) {
    alert('Delete failed: ' + err.message);
  }
}

// ── export / import ───────────────────────────────────────────────
async function doExport() {
  try {
    const r    = await fetch('/api/posts');
    const data = await r.json();
    const list = data.posts || [];
    if (!list.length) { alert('No posts to export.'); return; }
    const blob = new Blob([JSON.stringify({ exported_at: new Date().toISOString(), total: list.length, posts: list }, null, 2)], { type: 'application/json' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = 'xenon-blog-backup-' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
  } catch (err) { alert('Export failed: ' + err.message); }
}

async function doImport(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm('Re-upload all posts from this file? Duplicates may appear.')) { input.value = ''; return; }
  try {
    const backup = JSON.parse(await file.text());
    const list   = backup.posts || [];
    if (!list.length) { alert('No posts in file.'); return; }
    let ok = 0, fail = 0;
    for (const p of list) {
      const r = await fetch('/api/posts', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
        body:    JSON.stringify({ title: p.title, subtitle: p.subtitle, category: p.category, tags: p.tags, body: p.body, bannerType: p.bannerType, bannerMsg: p.bannerMsg }),
      });
      r.ok ? ok++ : fail++;
    }
    alert('Done.\n✓ ' + ok + ' restored' + (fail ? '\n✗ ' + fail + ' failed' : ''));
    loadPosts();
  } catch (err) { alert('Import failed: ' + err.message); }
  finally { input.value = ''; }
}

// ── utils ─────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
