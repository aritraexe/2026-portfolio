<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Xenon</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:     #0b0b0b;
  --bg2:    #0f0f0f;
  --text:   #ffffff;
  --muted:  #bfbfbf;
  --border: #222222;
  --accent: #4caf7d;
}
[data-theme="light"] {
  --bg:     #fafaf8;
  --bg2:    #f3f2ef;
  --text:   #1a1917;
  --muted:  #888580;
  --border: #e0deda;
}

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ── LOGIN ── */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.login-box {
  width: 100%;
  max-width: 360px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 2.2rem 2rem;
}
.login-logo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 1.5rem;
}
.login-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.8rem; }
.login-field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
.login-field label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem; color: var(--muted);
  letter-spacing: 0.08em; text-transform: uppercase;
}
.login-field input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.7rem 0.9rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  border-radius: 4px;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
.login-field input:focus { border-color: var(--accent); }
.login-err {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.7rem;
  color: #e05252;
  margin-top: 0.3rem;
  display: none;
}
.btn-primary {
  width: 100%;
  background: var(--accent);
  color: #000;
  border: none;
  padding: 0.75rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: opacity 0.2s;
}
.btn-primary:hover { opacity: 0.85; }

/* ── ADMIN PANEL ── */
#adminPanel {
  display: none;
  max-width: 780px;
  margin: 0 auto;
  padding: 3rem 2rem 5rem;
}

.admin-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2.5rem;
  padding-bottom: 1.2rem;
  border-bottom: 1px solid var(--border);
}
.admin-title { font-size: 1.1rem; font-weight: 600; }
.admin-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--muted); }

.btn-sm {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.38rem 0.85rem;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  position: relative;
}
.btn-sm:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm.danger:hover { border-color: #e05252; color: #e05252; }

/* ── FORM ── */
.form-section { margin-bottom: 3rem; }
.section-heading {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 1.4rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.section-heading::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

.edit-notice {
  display: none;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 4px;
  padding: 0.75rem 1rem;
  margin-bottom: 1.2rem;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.72rem;
  color: var(--muted);
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}
.edit-notice.visible { display: flex; }
.edit-notice-title { color: var(--text); font-weight: 500; }

.field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
.field label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.field input,
.field select,
.field textarea {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0.72rem 0.9rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  border-radius: 4px;
  outline: none;
  width: 100%;
  resize: vertical;
  transition: border-color 0.2s;
}
.field input:focus,
.field select:focus,
.field textarea:focus { border-color: var(--accent); }
.field select option { background: var(--bg2); }
.field textarea { min-height: 280px; font-size: 0.87rem; line-height: 1.7; }
.field-hint {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  color: var(--muted);
  margin-top: 0.3rem;
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

/* ── TOOLBAR ── */
.editor-toolbar {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 0.5rem;
}
.tb-btn {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.3rem 0.65rem;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.2s;
}
.tb-btn:hover { border-color: var(--accent); color: var(--text); }
.tb-btn:disabled { opacity: 0.4; pointer-events: none; }

/* ── PUBLISH ROW ── */
.publish-row { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-top: 0.5rem; }
.btn-publish {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 0.75rem 2rem;
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  font-weight: 600;
  border-radius: 4px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.btn-publish:hover { opacity: 0.85; }
.publish-status {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
}

/* ── POSTS LIST ── */
.posts-list { display: flex; flex-direction: column; }
.post-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 0;
  border-bottom: 1px solid var(--border);
  gap: 1rem;
}
.post-row:first-child { border-top: 1px solid var(--border); }
.post-row-info { flex: 1; min-width: 0; }
.post-row-title {
  font-size: 0.88rem;
  font-weight: 500;
  margin-bottom: 0.2rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.post-row-meta {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  color: var(--muted);
}
.post-row-actions { display: flex; gap: 0.5rem; flex-shrink: 0; }
.btn-action {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 0.28rem 0.65rem;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  border-radius: 3px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  transition: all 0.2s;
}
.btn-action:hover { border-color: var(--muted); color: var(--text); }
.btn-action.edit:hover { border-color: var(--accent); color: var(--accent); }
.btn-action.del:hover { border-color: #e05252; color: #e05252; }

.no-posts {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.78rem;
  color: var(--muted);
  padding: 1.5rem 0;
}

@media (max-width: 580px) {
  #adminPanel { padding: 2rem 1.2rem 4rem; }
  .field-row { grid-template-columns: 1fr; }
  .post-row { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <p class="login-logo">Xenon · Admin</p>
    <h1 class="login-title">Sign in</h1>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="pwInput" placeholder="Enter admin password"
             onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <p class="login-err" id="loginErr">Incorrect password.</p>
    <button class="btn-primary" onclick="doLogin()">Continue</button>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div id="adminPanel">

  <div class="admin-header">
    <div>
      <p class="admin-meta">Xenon · Admin Panel</p>
      <h1 class="admin-title">Blog Manager</h1>
    </div>
    <div style="display:flex;gap:0.6rem;align-items:center;">
      <button class="btn-sm" onclick="doExport()">⬇ Export</button>
      <label class="btn-sm" style="cursor:pointer;">
        ⬆ Import
        <input type="file" accept=".json" style="display:none" onchange="doImport(this)"/>
      </label>
      <button class="btn-sm danger" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <!-- FORM -->
  <div class="form-section">
    <p class="section-heading" id="formHeading">New Post</p>

    <div class="edit-notice" id="editNotice">
      <span>✏️ Editing: <span class="edit-notice-title" id="editNoticeTitle"></span></span>
      <button class="btn-sm" onclick="resetForm()">✕ Cancel edit</button>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Title *</label>
        <input type="text" id="fTitle" placeholder="Post title"/>
      </div>
      <div class="field">
        <label>Category</label>
        <select id="fCategory">
          <option>Project Write-up</option>
          <option>Architecture</option>
          <option>Mobile</option>
          <option>Performance</option>
          <option>Opinion</option>
          <option>Tutorial</option>
          <option>General</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Subtitle</label>
      <input type="text" id="fSubtitle" placeholder="Short description shown in listing"/>
    </div>

    <div class="field">
      <label>Tags <span style="font-weight:300">(comma separated)</span></label>
      <input type="text" id="fTags" placeholder="e.g. Discord.js, Node.js, MongoDB"/>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Banner Type <span style="font-weight:300">(optional)</span></label>
        <select id="fBannerType" onchange="onBannerChange()">
          <option value="">None</option>
          <option value="wip">🚧 Work in Progress</option>
          <option value="info">ℹ️ Info</option>
          <option value="warning">⚠️ Warning</option>
          <option value="tip">💡 Tip</option>
          <option value="update">🔄 Update</option>
          <option value="deprecated">❌ Deprecated</option>
        </select>
      </div>
      <div class="field">
        <label>Banner Message <span style="font-weight:300">(auto-filled)</span></label>
        <input type="text" id="fBannerMsg" placeholder="Leave blank to use default"/>
      </div>
    </div>

    <div class="field">
      <label>Body *</label>
      <div class="editor-toolbar">
        <button class="tb-btn" onclick="tbWrap('## ','')">H2</button>
        <button class="tb-btn" onclick="tbWrap('### ','')">H3</button>
        <button class="tb-btn" onclick="tbWrap('**','**')">Bold</button>
        <button class="tb-btn" onclick="tbWrap('*','*')">Italic</button>
        <button class="tb-btn" onclick="tbWrap('`','`')">Code</button>
        <button class="tb-btn" onclick="tbList()">List</button>
        <button class="tb-btn" onclick="tbDivider()">Divider</button>
        <button class="tb-btn" id="imgBtn" onclick="document.getElementById('imgInput').click()">📷 Image</button>
        <input type="file" id="imgInput" accept="image/*" style="display:none" onchange="doImageUpload(this)"/>
        <span id="imgStatus" style="font-family:'IBM Plex Mono',monospace;font-size:0.65rem;color:var(--muted);align-self:center;"></span>
      </div>
      <textarea id="fBody" placeholder="Write your post here. Use ## for headings, **bold**, *italic*, `code`, and - for lists."></textarea>
      <p class="field-hint">## H2 · ### H3 · **bold** · *italic* · `code` · - list item · ![alt](url) for images</p>
    </div>

    <div class="publish-row">
      <button class="btn-publish" id="publishBtn" onclick="doPublish()">Publish Post →</button>
      <span class="publish-status" id="publishStatus"></span>
    </div>
  </div>

  <!-- POSTS LIST -->
  <div class="form-section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.4rem;">
      <p class="section-heading" style="margin-bottom:0;">Published Posts</p>
    </div>
    <div class="posts-list" id="postsList">
      <p class="no-posts">Loading…</p>
    </div>
  </div>

</div>

<script>
'use strict';

// ── STATE ──────────────────────────────────────────────────────────
let TOKEN      = null;   // admin password used as bearer token
let EDITING_ID = null;   // id of post being edited, or null

// ── BANNER DEFAULTS ────────────────────────────────────────────────
const BANNER_DEFAULTS = {
  wip:        'This post is a work in progress. Content and details will be updated soon.',
  info:       'Just a heads up — some context worth knowing before reading.',
  warning:    'Caution: proceed carefully. Some parts of this may not work as expected.',
  tip:        'Pro tip — this little detail can save you a lot of time.',
  update:     'This post has been updated. Some information may differ from the original.',
  deprecated: 'Heads up — this content is outdated and may no longer be accurate.',
};

// ── CLOUDINARY ─────────────────────────────────────────────────────
const CLD_CLOUD  = 'dw38typxl';
const CLD_PRESET = 'nx7evrcy';

// ── INIT ───────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = sessionStorage.getItem('xenon_admin');
  if (saved) { TOKEN = saved; showPanel(); }
});

// ── LOGIN ──────────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('pwInput').value.trim();
  if (!pw) return;

  // Verify password by hitting the API with a harmless GET
  // (GET is public but we need to confirm the password works for write ops,
  //  so we send a quick OPTIONS-style POST with a __ping flag)
  fetch('/api/posts', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + pw },
    body:    JSON.stringify({ __ping: true }),
  })
  .then(r => {
    if (r.status === 401) {
      document.getElementById('loginErr').style.display = 'block';
      return;
    }
    // 200 or 400 both mean auth passed
    document.getElementById('loginErr').style.display = 'none';
    TOKEN = pw;
    sessionStorage.setItem('xenon_admin', pw);
    showPanel();
  })
  .catch(() => {
    document.getElementById('loginErr').style.display = 'block';
  });
}

function showPanel() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display  = 'block';
  loadPosts();
}

function doLogout() {
  TOKEN = null;
  sessionStorage.removeItem('xenon_admin');
  document.getElementById('adminPanel').style.display  = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value             = '';
  document.getElementById('loginErr').style.display    = 'none';
  resetForm();
}

// ── FORM HELPERS ───────────────────────────────────────────────────
function getFormValues() {
  return {
    title:      document.getElementById('fTitle').value.trim(),
    subtitle:   document.getElementById('fSubtitle').value.trim(),
    category:   document.getElementById('fCategory').value,
    tags:       document.getElementById('fTags').value.split(',').map(t => t.trim()).filter(Boolean),
    bannerType: document.getElementById('fBannerType').value,
    bannerMsg:  document.getElementById('fBannerMsg').value.trim(),
    body:       document.getElementById('fBody').value.trim(),
  };
}

function resetForm() {
  EDITING_ID = null;
  ['fTitle','fSubtitle','fTags','fBannerMsg','fBody'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('fCategory').value   = 'Project Write-up';
  document.getElementById('fBannerType').value = '';
  document.getElementById('formHeading').textContent  = 'New Post';
  document.getElementById('publishBtn').textContent   = 'Publish Post →';
  document.getElementById('publishStatus').textContent = '';
  document.getElementById('editNotice').classList.remove('visible');
}

function onBannerChange() {
  const type = document.getElementById('fBannerType').value;
  document.getElementById('fBannerMsg').value = type ? (BANNER_DEFAULTS[type] || '') : '';
}

// ── TOOLBAR ────────────────────────────────────────────────────────
function tbWrap(before, after) {
  const ta  = document.getElementById('fBody');
  const s   = ta.selectionStart;
  const e   = ta.selectionEnd;
  const sel = ta.value.substring(s, e) || 'text';
  ta.value  = ta.value.substring(0, s) + before + sel + after + ta.value.substring(e);
  ta.focus();
  ta.selectionStart = s + before.length;
  ta.selectionEnd   = s + before.length + sel.length;
}
function tbList() {
  const ta  = document.getElementById('fBody');
  const pos = ta.selectionStart;
  const ins = '\n- Item 1\n- Item 2\n- Item 3\n';
  ta.value  = ta.value.substring(0, pos) + ins + ta.value.substring(pos);
  ta.focus();
}
function tbDivider() {
  const ta  = document.getElementById('fBody');
  const pos = ta.selectionStart;
  const ins = '\n\n---\n\n';
  ta.value  = ta.value.substring(0, pos) + ins + ta.value.substring(pos);
  ta.focus();
}

// ── IMAGE UPLOAD ───────────────────────────────────────────────────
async function doImageUpload(input) {
  const file = input.files[0];
  if (!file) return;

  const btn    = document.getElementById('imgBtn');
  const status = document.getElementById('imgStatus');
  const ta     = document.getElementById('fBody');

  btn.disabled      = true;
  btn.textContent   = '⏳ Uploading…';
  status.textContent = '';

  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', CLD_PRESET);

  try {
    const r    = await fetch('https://api.cloudinary.com/v1_1/' + CLD_CLOUD + '/image/upload', { method: 'POST', body: fd });
    const data = await r.json();
    if (!data.secure_url) throw new Error('No URL returned');

    const alt = file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ');
    const md  = '\n\n![' + alt + '](' + data.secure_url + ')\n\n';
    const pos = ta.selectionStart;
    ta.value  = ta.value.substring(0, pos) + md + ta.value.substring(pos);
    ta.focus();

    status.style.color  = '#4caf7d';
    status.textContent  = '✓ Uploaded';
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch (err) {
    status.style.color  = '#e05252';
    status.textContent  = '✗ Upload failed';
  } finally {
    btn.disabled    = false;
    btn.textContent = '📷 Image';
    input.value     = '';
  }
}

// ── PUBLISH / SAVE ─────────────────────────────────────────────────
async function doPublish() {
  const vals   = getFormValues();
  const status = document.getElementById('publishStatus');

  if (!vals.title) { setStatus('⚠ Title is required.', '#e05252'); return; }
  if (!vals.body)  { setStatus('⚠ Body is required.',  '#e05252'); return; }

  const isEdit = EDITING_ID !== null;
  setStatus(isEdit ? 'Saving…' : 'Publishing…', 'var(--muted)');

  const payload = { ...vals };
  if (isEdit) payload.id = EDITING_ID;

  try {
    const r    = await fetch('/api/posts', {
      method:  isEdit ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
      body:    JSON.stringify(payload),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Request failed');

    setStatus(isEdit ? '✓ Saved — ' + data.slug : '✓ Published — ' + data.slug, '#4caf7d');
    resetForm();
    loadPosts();
  } catch (err) {
    setStatus('✗ ' + (err.message || 'Failed.'), '#e05252');
  }
}

function setStatus(msg, color) {
  const el = document.getElementById('publishStatus');
  el.textContent  = msg;
  el.style.color  = color;
}

// ── LOAD POSTS ─────────────────────────────────────────────────────
async function loadPosts() {
  const el = document.getElementById('postsList');
  el.innerHTML = '<p class="no-posts">Loading…</p>';

  try {
    const r    = await fetch('/api/posts');
    const data = await r.json();
    const list = data.posts || [];

    if (!list.length) {
      el.innerHTML = '<p class="no-posts">No posts yet.</p>';
      return;
    }

    el.innerHTML = list.map(p => {
      const date    = new Date(p.date).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' });
      const updated = p.updatedAt ? ' · edited ' + new Date(p.updatedAt).toLocaleDateString('en-IN', { day:'numeric', month:'short' }) : '';
      // Safely encode post data for the edit button
      const encoded = encodeURIComponent(JSON.stringify(p));
      return '<div class="post-row">'
        + '<div class="post-row-info">'
        + '<p class="post-row-title">' + escHtml(p.title) + '</p>'
        + '<p class="post-row-meta">' + date + updated + ' · ' + escHtml(p.category) + '</p>'
        + '</div>'
        + '<div class="post-row-actions">'
        + '<a class="btn-action" href="/api/post-page?slug=' + p.slug + '" target="_blank">View ↗</a>'
        + '<button class="btn-action edit" onclick="startEdit(decodeURIComponent(\'' + encoded + '\'))">Edit</button>'
        + '<button class="btn-action del" onclick="doDelete(\'' + p.id + '\',\'' + escAttr(p.title) + '\')">Delete</button>'
        + '</div>'
        + '</div>';
    }).join('');

  } catch (err) {
    el.innerHTML = '<p class="no-posts">Failed to load posts.</p>';
  }
}

// ── EDIT ───────────────────────────────────────────────────────────
function startEdit(encodedJson) {
  let post;
  try { post = JSON.parse(encodedJson); }
  catch { alert('Could not load post data.'); return; }

  EDITING_ID = post.id;

  document.getElementById('fTitle').value      = post.title      || '';
  document.getElementById('fSubtitle').value   = post.subtitle   || '';
  document.getElementById('fTags').value       = (post.tags || []).join(', ');
  document.getElementById('fBannerType').value = post.bannerType || '';
  document.getElementById('fBannerMsg').value  = post.bannerMsg  || '';
  document.getElementById('fBody').value       = post.body       || '';

  // Set category — find matching option
  const catSelect = document.getElementById('fCategory');
  for (let i = 0; i < catSelect.options.length; i++) {
    if (catSelect.options[i].value === post.category) {
      catSelect.selectedIndex = i;
      break;
    }
  }

  document.getElementById('formHeading').textContent        = 'Edit Post';
  document.getElementById('publishBtn').textContent         = 'Save Changes →';
  document.getElementById('editNoticeTitle').textContent    = post.title;
  document.getElementById('editNotice').classList.add('visible');
  document.getElementById('publishStatus').textContent      = '';

  document.getElementById('fTitle').scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => document.getElementById('fTitle').focus(), 400);
}

// ── DELETE ─────────────────────────────────────────────────────────
async function doDelete(id, title) {
  if (!confirm('Delete "' + title + '"?\nThis cannot be undone.')) return;

  try {
    const r    = await fetch('/api/posts', {
      method:  'DELETE',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
      body:    JSON.stringify({ id }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Delete failed');
    // If we were editing this post, reset form
    if (EDITING_ID === id) resetForm();
    loadPosts();
  } catch (err) {
    alert('Delete failed: ' + err.message);
  }
}

// ── EXPORT ─────────────────────────────────────────────────────────
async function doExport() {
  try {
    const r    = await fetch('/api/posts');
    const data = await r.json();
    const list = data.posts || [];
    if (!list.length) { alert('No posts to export.'); return; }

    const backup = { exported_at: new Date().toISOString(), total: list.length, posts: list };
    const blob   = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url    = URL.createObjectURL(blob);
    const a      = document.createElement('a');
    a.href       = url;
    a.download   = 'xenon-blog-backup-' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('Export failed: ' + err.message);
  }
}

// ── IMPORT ─────────────────────────────────────────────────────────
async function doImport(input) {
  const file = input.files[0];
  if (!file) return;
  if (!confirm('Re-upload all posts from this backup? Duplicates may appear if posts already exist.')) {
    input.value = ''; return;
  }

  try {
    const text   = await file.text();
    const backup = JSON.parse(text);
    const list   = backup.posts || [];
    if (!list.length) { alert('No posts found in file.'); return; }

    let ok = 0, fail = 0;
    for (const p of list) {
      const r = await fetch('/api/posts', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + TOKEN },
        body:    JSON.stringify({
          title: p.title, subtitle: p.subtitle, category: p.category,
          tags: p.tags, body: p.body, bannerType: p.bannerType, bannerMsg: p.bannerMsg,
        }),
      });
      r.ok ? ok++ : fail++;
    }
    alert('Import done.\n✓ ' + ok + ' restored' + (fail ? '\n✗ ' + fail + ' failed' : ''));
    loadPosts();
  } catch (err) {
    alert('Import failed: ' + err.message);
  } finally {
    input.value = '';
  }
}

// ── UTILS ──────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/'/g, "\\'").replace(/"/g, '\\"');
}
</script>
