<style>
.contact-intro { font-size: 0.92rem; color: var(--muted); line-height: 1.85; margin-bottom: 2rem; max-width: 460px; }

.contact-rows { display: flex; flex-direction: column; margin-bottom: 3rem; }
.contact-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.95rem 0; border-bottom: 1px solid var(--border);
  font-size: 0.85rem; transition: opacity 0.2s;
  text-decoration: none; color: inherit;
}
.contact-row:first-child { border-top: 1px solid var(--border); }
.contact-row:hover { opacity: 0.6; }
.contact-row-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--muted); }
.contact-row-arrow { color: var(--muted); font-size: 0.78rem; }

.form-section-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.68rem; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-bottom: 1.2rem;
}
.contact-form { display: flex; flex-direction: column; gap: 1rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
.form-field { display: flex; flex-direction: column; gap: 0.4rem; }
.form-field label { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.form-field input, .form-field textarea {
  background: var(--bg2); border: 1px solid var(--border);
  color: var(--text); padding: 0.68rem 0.85rem;
  font-family: 'Inter', sans-serif; font-size: 0.87rem;
  border-radius: 3px; outline: none; resize: none; width: 100%;
  transition: border-color 0.2s;
}
.form-field input:focus, .form-field textarea:focus { border-color: var(--muted); }
.form-field textarea { min-height: 120px; }
.form-send {
  background: var(--text); color: var(--bg);
  border: none; padding: 0.7rem 1.4rem;
  font-family: 'Inter', sans-serif; font-size: 0.84rem; font-weight: 500;
  border-radius: 3px; cursor: pointer; align-self: flex-start;
  transition: opacity 0.2s;
}
.form-send:hover { opacity: 0.75; }

/* SOCIALS CARD */
.socials-card {
  margin-bottom: 2.5rem;
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 0.5rem 0.75rem;
}
.social-icon {
  position: relative;
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.18s cubic-bezier(.34,1.56,.64,1), background 0.18s;
  text-decoration: none;
  flex-shrink: 0;
  color: var(--muted);
  background: transparent;
}
.social-icon svg { width: 17px; height: 17px; display: block; transition: color 0.18s; }
.social-icon:hover { transform: translateY(-4px) scale(1.12); }
.social-icon:hover svg { color: var(--text); }

/* Tooltip */
.social-icon::after {
  content: attr(aria-label);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%; transform: translateX(-50%) scale(0.85);
  background: var(--text);
  color: var(--bg);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 0.62rem;
  letter-spacing: 0.04em;
  white-space: nowrap;
  padding: 0.25rem 0.55rem;
  border-radius: 4px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s, transform 0.15s;
  transform-origin: bottom center;
}
.social-icon::before {
  content: '';
  position: absolute;
  bottom: calc(100% + 4px);
  left: 50%; transform: translateX(-50%);
  border: 4px solid transparent;
  border-top-color: var(--text);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
}
.social-icon:hover::after { opacity: 1; transform: translateX(-50%) scale(1); }
.social-icon:hover::before { opacity: 1; }

@media (max-width: 580px) {
  .form-row { grid-template-columns: 1fr; }
  .socials-card { flex-wrap: wrap; border-radius: 16px; }
}

<div class="page-header">

  <div class="contact-form" id="contactForm">

      <div class="form-field"><label>Name</label><input type="text" id="fname" placeholder="Your name" required/></div>

<script>
async function handleSend() {
  const btn     = document.getElementById('formBtn');
  const errBox  = document.getElementById('formError');
  const name    = document.getElementById('fname').value.trim();
  const email   = document.getElementById('femail').value.trim();
  const message = document.getElementById('fmessage').value.trim();

  errBox.style.display = 'none';

  if (!name || !email || !message) {
    errBox.textContent = 'All fields are required.';
    errBox.style.display = 'block';
    return;
  }

  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    const res = await fetch('/api/contact', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, message }),
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || 'Something went wrong.');
    }

    document.getElementById('contactForm').style.display = 'none';
    document.getElementById('formSuccess').style.display = 'block';

  } catch (err) {
    errBox.textContent = err.message || 'Failed to send. Please try again.';
    errBox.style.display = 'block';
    btn.textContent = 'Send message';
    btn.disabled = false;
  }
}
</script>
